name: warden
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "images/bg_img.png"
  adaptive_icon_background: "#000D1A" 
  adaptive_icon_foreground: "images/warden_logo.png"

flutter:

  uses-material-design: true
  assets:
    - images/
    - fonts/
    - assets/warden_music.mp3
    - assets/warden_button_sound.wav

  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/Orbitron-Regular.ttf
    - family: Source Sans 3
      fonts:
        - asset: fonts/SourceSans3-Regular.ttf
